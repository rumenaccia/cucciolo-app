  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><text x='50%' y='50%' font-size='120' text-anchor='middle' dominant-baseline='middle'>🐱</text></svg>">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #FFE8F5, #E8F5FF); min-height: 100vh; }
    body.dark { background: linear-gradient(135deg, #2a1f35, #1f2535); color: #e0e0e0; }
    #root { width: 100%; max-width: 420px; height: 100vh; margin: 0 auto; display: flex; flex-direction: column; }

    ::-webkit-scrollbar-track { background: transparent; }

<body>

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>

    };

    const RECIPES = [
      { id: "cap", name: "Caprese", needs: ["pomodoro", "mozzarella", "basilico"], emoji: "🥗", vita: 30 },
      { id: "pesto", name: "Pasta al pesto", needs: ["pasta", "basilico", "aglio", "pinoli"], emoji: "🍝", vita: 50 },
      { id: "tira", name: "Tiramisù", needs: ["mascarpone", "uovo", "caffè", "biscotti"], emoji: "🍰", vita: 60 },
      { id: "carb", name: "Carbonara", needs: ["pasta", "guanciale", "uovo", "pecorino"], emoji: "🍝", vita: 55 },
      { id: "gnocchi", name: "Gnocchi", needs: ["patate", "farina", "burro", "salvia"], emoji: "🍲", vita: 48 },
      { id: "brusc", name: "Bruschetta", needs: ["pane", "pomodoro", "aglio", "basilico"], emoji: "🥖", vita: 35 },
      { id: "risotto", name: "Risotto funghi", needs: ["riso", "funghi", "vino", "brodo"], emoji: "🍚", vita: 52 },
      { id: "pizza", name: "Pizza", needs: ["farina", "pomodoro", "mozzarella", "basilico"], emoji: "🍕", vita: 58 },
      { id: "amatri", name: "Amatriciana", needs: ["pasta", "pomodoro", "guanciale", "pecorino"], emoji: "🍝", vita: 53 },
      { id: "osso", name: "Osso buco", needs: ["vitello", "vino", "brodo", "carota"], emoji: "🍖", vita: 65 },

      { id: "pomodoro", emoji: "🍅" }, { id: "mozzarella", emoji: "🧀" }, { id: "basilico", emoji: "🌿" },
      { id: "pasta", emoji: "🍝" }, { id: "aglio", emoji: "🧄" }, { id: "mascarpone", emoji: "🥣" },
      { id: "uovo", emoji: "🥚" }, { id: "caffè", emoji: "☕" }, { id: "biscotti", emoji: "🍪" },
      { id: "pinoli", emoji: "🌰" }, { id: "guanciale", emoji: "🥓" }, { id: "pecorino", emoji: "🧀" },
      { id: "patate", emoji: "🥔" }, { id: "farina", emoji: "🌾" }, { id: "burro", emoji: "🧈" },
      { id: "salvia", emoji: "🌿" }, { id: "pane", emoji: "🥖" }, { id: "riso", emoji: "🍚" },
      { id: "funghi", emoji: "🍄" }, { id: "vino", emoji: "🍷" }, { id: "brodo", emoji: "🍶" },
      { id: "vitello", emoji: "🍖" }, { id: "carota", emoji: "🥕" },
    ];

    const MOTIVATIONAL_QUOTES = [
      "Oggi è un giorno perfetto per non fumare! 💪",
      "L'acqua è la miglior medicina. Bevi! 💧",
      "Mangia bene, il tuo gatto ti ringrazierà 🥗",

      "Riposa bene, recupera le forze 😴",
      "Muoviti un po'! Il tuo corpo e il tuo gatto ringraziano 🏃",
    ];

    const DAILY_MISSIONS = [
      { id: "eat", emoji: "🍽️", label: "Mangia bene" },
      { id: "water", emoji: "💧", label: "Bevi acqua" },
      { id: "no_smoke", emoji: "🚭", label: "Non fumare" },
      { id: "no_drink", emoji: "🚫", label: "No alcol" },
      { id: "move", emoji: "🏃", label: "Movimento" },
    ];

    const BADGES = [
      { id: "week_clean", label: "Settimana Pulita", emoji: "🌟", points: 100 },
      { id: "month_clean", label: "Mese Perfetto", emoji: "👑", points: 500 },
      { id: "chef", label: "Chef", emoji: "🍳", points: 50 },
      { id: "sage", label: "Saggio", emoji: "🧙", points: 1000 },
    ];

    const MAX_VITA_DAYS = 1825;

    // ===== UTILS =====
    function stageFor(points) {
      if (points < 100) return { key: "cucciolo", label: "Cucciolotto", icon: "🍼" };
      if (points < 250) return { key: "adolescente", label: "Adolescente", icon: "🎒" };
      if (points < 450) return { key: "piccolo_adulto", label: "Piccolo Adulto", icon: "📚" };
      if (points < 700) return { key: "adulto", label: "Adulto", icon: "💼" };
      return { key: "anziano", label: "Anziano", icon: "🧓" };
    }

    function uid() {
      return Math.random().toString(36).slice(2, 9);
    }

    function formatDays(days) {
      const years = Math.floor(days / 365);
      const months = Math.floor((days % 365) / 30);
      if (years > 0) return `${years}a ${months}m`;
      return `${Math.floor(days)}g`;
    }

    function playSound(type) {
      const frequencies = {
        eat: 440, smoke: 220, drink: 330, win: 659, milestone: 784
      };
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = frequencies[type] || 440;
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.2);
    }

    function getAffectionLevel(profile) {
      const vitaPercent = (profile.vitaDays / MAX_VITA_DAYS) * 100;
      const cleanDays = profile.lastSmoke ? Math.floor((new Date() - new Date(profile.lastSmoke)) / (1000 * 60 * 60 * 24)) : -1;
      if (vitaPercent > 80 && cleanDays > 7) return { emoji: "😍", text: "Felicissimo!", color: "#45D6B5" };
      if (vitaPercent > 60 && cleanDays > 3) return { emoji: "😊", text: "Contento", color: "#FFE070" };
      if (vitaPercent > 40) return { emoji: "😐", text: "Neutro", color: "#D4748E" };
      return { emoji: "😔", text: "Triste", color: "#FF6FB0" };
    }

    // ===== RAGDOLL CAT COMPONENT =====
    function RagdollCat({ stage = "cucciolo", size = 300 }) {
      const canvasRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current) return;
        const canvas = canvasRef.current;
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");
        let animationId;

        const animate = (time) => {
          // Background gradient
          const bgGrad = ctx.createLinearGradient(0, 0, size, size);
          bgGrad.addColorStop(0, "#FFD4E5");
          bgGrad.addColorStop(0.5, "#FFBFD5");
          bgGrad.addColorStop(1, "#FFAAD0");
          ctx.fillStyle = bgGrad;
          ctx.fillRect(0, 0, size, size);

          ctx.save();
          ctx.translate(size / 2, size / 2);

          const bodyColor = "#EDD0E3";
          const pointColor = "#D4748E";
          const darkPoint = "#9A4A6D";
          const t = time / 1000;

          let scale = 1;
          if (stage === "cucciolo") scale = 0.55;
          else if (stage === "adolescente") scale = 0.72;
          else if (stage === "piccolo_adulto") scale = 0.88;
          else if (stage === "adulto") scale = 1;
          else if (stage === "anziano") scale = 1.05;

          // Shadow
          const shadowGrad = ctx.createRadialGradient(0, size / 2, 0, 0, size / 2, size / 1.6);
          shadowGrad.addColorStop(0, "rgba(150, 70, 110, 0.35)");
          shadowGrad.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = shadowGrad;
          ctx.beginPath();
          ctx.ellipse(0, size / 2.3, size / 2.2, size / 5.5, 0, 0, Math.PI * 2);
          ctx.fill();

          // Body
          ctx.fillStyle = bodyColor;
          ctx.beginPath();
          ctx.ellipse(0, size / 10 * scale, size / 2 * scale, size / 2.4 * scale, Math.sin(t) * 0.1, 0, Math.PI * 2);
          ctx.fill();

          const bodyShade = ctx.createLinearGradient(-size / 2 * scale, 0, size / 2 * scale, 0);
          bodyShade.addColorStop(0, "rgba(154, 74, 109, 0.22)");
          bodyShade.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = bodyShade;
          ctx.beginPath();
          ctx.ellipse(0, size / 10 * scale, size / 2 * scale, size / 2.4 * scale, Math.sin(t) * 0.1, 0, Math.PI * 2);
          ctx.fill();

          // Head
          ctx.fillStyle = bodyColor;
          ctx.beginPath();
          ctx.arc(0, -size / 2.9 * scale, size / 2.2 * scale, 0, Math.PI * 2);
          ctx.fill();

          const headShade = ctx.createRadialGradient(-size / 6.5 * scale, -size / 2.2 * scale, 0, 0, -size / 2.9 * scale, size / 2.2 * scale);
          headShade.addColorStop(0, "rgba(154, 74, 109, 0.18)");
          headShade.addColorStop(1, "rgba(0, 0, 0, 0.22)");
          ctx.fillStyle = headShade;
          ctx.beginPath();
          ctx.arc(0, -size / 2.9 * scale, size / 2.2 * scale, 0, Math.PI * 2);
          ctx.fill();

          // Ears
          const earY = -size / 2.35 * scale;
          const earX1 = -size / 4.8 * scale;
          const earX2 = size / 4.8 * scale;

          ctx.fillStyle = bodyColor;
          ctx.beginPath();
          ctx.ellipse(earX1, earY, size / 14 * scale, size / 9 * scale, -0.28, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = pointColor;
          ctx.beginPath();
          ctx.ellipse(earX1 - size / 48 * scale, earY + size / 32 * scale, size / 18 * scale, size / 12 * scale, -0.28, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = bodyColor;
          ctx.beginPath();
          ctx.ellipse(earX2, earY, size / 14 * scale, size / 9 * scale, 0.28, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = pointColor;
          ctx.beginPath();
          ctx.ellipse(earX2 + size / 48 * scale, earY + size / 32 * scale, size / 18 * scale, size / 12 * scale, 0.28, 0, Math.PI * 2);
          ctx.fill();

          // Eyes
          const eyeY = -size / 3.5 * scale;
          const eyeX1 = -size / 6 * scale;
          const eyeX2 = size / 6 * scale;

          ctx.fillStyle = "#ffffff";
          ctx.shadowColor = "rgba(0,0,0,0.1)";
          ctx.shadowBlur = 4;
          ctx.beginPath();
          ctx.ellipse(eyeX1, eyeY, size / 15 * scale, size / 12 * scale, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(eyeX2, eyeY, size / 15 * scale, size / 12 * scale, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowColor = "transparent";

          ctx.fillStyle = "#4A9FE0";
          const pupilOffset = Math.cos(t) * size / 42;
          ctx.beginPath();
          ctx.arc(eyeX1 + pupilOffset, eyeY, size / 26 * scale, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(eyeX2 + pupilOffset, eyeY, size / 26 * scale, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#000000";
          ctx.beginPath();
          ctx.arc(eyeX1 + pupilOffset, eyeY, size / 46 * scale, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(eyeX2 + pupilOffset, eyeY, size / 46 * scale, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
          ctx.beginPath();
          ctx.arc(eyeX1 + size / 38 * scale, eyeY - size / 48 * scale, size / 75 * scale, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(eyeX2 + size / 38 * scale, eyeY - size / 48 * scale, size / 75 * scale, 0, Math.PI * 2);
          ctx.fill();

          // Nose
          ctx.fillStyle = "#F4859E";
          ctx.beginPath();
          ctx.ellipse(0, -size / 5.2 * scale, size / 32 * scale, size / 36 * scale, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#E06284";
          ctx.beginPath();
          ctx.ellipse(size / 82 * scale, -size / 5.2 * scale + size / 60 * scale, size / 45 * scale, size / 50 * scale, 0, 0, Math.PI * 2);
          ctx.fill();

          // Mouth
          ctx.strokeStyle = pointColor;
          ctx.lineWidth = 1.8 * scale;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(0, -size / 5.2 * scale);
          ctx.lineTo(0, -size / 5.8 * scale);
          ctx.stroke();

          ctx.beginPath();
          ctx.arc(0, -size / 5.5 * scale, size / 22 * scale, 0, Math.PI);
          ctx.stroke();

          // Whiskers
          ctx.strokeStyle = darkPoint;
          ctx.lineWidth = 1.4 * scale;
          ctx.lineCap = "round";
          for (let i = -1; i <= 1; i++) {
            const y = -size / 4.8 * scale + i * size / 24 * scale;
            ctx.beginPath();
            ctx.moveTo(-size / 13 * scale, y);
            ctx.quadraticCurveTo(-size / 14 * scale - size / 28 * scale, y - size / 90 * scale, -size / 6.5 * scale, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(size / 13 * scale, y);
            ctx.quadraticCurveTo(size / 14 * scale + size / 28 * scale, y - size / 90 * scale, size / 6.5 * scale, y);
            ctx.stroke();
          }

          // Paws
          ctx.fillStyle = bodyColor;
          ctx.beginPath();
          ctx.ellipse(-size / 4.9 * scale, size / 2 * scale, size / 12.5 * scale, size / 3 * scale, -0.16, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(size / 4.9 * scale, size / 2 * scale, size / 12.5 * scale, size / 3 * scale, 0.16, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#F4859E";
          ctx.beginPath();
          ctx.arc(-size / 4.9 * scale, size / 1.7 * scale, size / 28 * scale, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(size / 4.9 * scale, size / 1.7 * scale, size / 28 * scale, 0, Math.PI * 2);
          ctx.fill();

          // Tail
          ctx.strokeStyle = bodyColor;
          ctx.lineWidth = size / 14 * scale;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.beginPath();
          ctx.moveTo(size / 3 * scale, size / 5 * scale);
          ctx.quadraticCurveTo(
            size / 1.9 * scale + Math.sin(t) * size / 12,
            -size / 3.2 * scale,
            size / 2.4 * scale,
            -size / 2.5 * scale
          );
          ctx.stroke();

          ctx.strokeStyle = "rgba(154, 74, 109, 0.18)";
          ctx.lineWidth = size / 12 * scale;
          ctx.beginPath();
          ctx.moveTo(size / 3 * scale + size / 90 * scale, size / 5 * scale);
          ctx.quadraticCurveTo(
            size / 1.9 * scale + Math.sin(t) * size / 12 + size / 70 * scale,
            -size / 3.2 * scale,
            size / 2.4 * scale + size / 50 * scale,
            -size / 2.5 * scale
          );
          ctx.stroke();

          ctx.restore();
          animationId = requestAnimationFrame(animate);
        };

        animate(0);
        return () => cancelAnimationFrame(animationId);
      }, [stage, size]);

      return React.createElement("canvas", { ref: canvasRef, style: { borderRadius: 20, boxShadow: "0 12px 32px rgba(74,58,107,.25)", display: "block", margin: "0 auto", maxWidth: "100%" } });
    }

    // ===== ONBOARDING =====
    function Onboarding({ onDone }) {
      const [step, setStep] = useState(0);

      const [myName, setMyName] = useState("");

      return React.createElement("div", { style: { padding: "40px 22px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", textAlign: "center", background: "linear-gradient(135deg, #FFE8F5, #E8F5FF)" } },
        step === 0 ? React.createElement(React.Fragment, null,
          React.createElement("div", { style: { fontSize: 52, marginBottom: 12 } }, "🐾"),
          React.createElement("h1", { style: { fontSize: 28, marginBottom: 8, color: "#4A3A6B", fontWeight: 700, fontFamily: "'Fredoka', sans-serif" } }, "Benvenuto in Cucciolo!"),
          React.createElement("p", { style: { fontSize: 12, color: "#8F84B0", marginBottom: 24, lineHeight: 1.6 } }, "Un Ragdoll che vivrà 5 anni con te e crescerà insieme ai tuoi traguardi."),
          React.createElement("label", { style: { fontSize: 11, color: "#FF6FB0", marginBottom: 4, display: "block", fontWeight: 700 } }, "Il tuo nome"),
          React.createElement("input", { style: { width: "100%", padding: "10px 12px", borderRadius: 10, border: "1px solid rgba(255, 255, 255, 0.4)", background: "rgba(255, 255, 255, 0.5)", fontSize: 13, marginBottom: 12, fontFamily: "'Quicksand', sans-serif" }, value: myName, onChange: (e) => setMyName(e.target.value), placeholder: "Es. Marco" }),
          React.createElement("label", { style: { fontSize: 11, color: "#FF6FB0", marginBottom: 4, display: "block", fontWeight: 700 } }, "Nome del tuo Ragdoll"),
          React.createElement("input", { style: { width: "100%", padding: "10px 12px", borderRadius: 10, border: "1px solid rgba(255, 255, 255, 0.4)", background: "rgba(255, 255, 255, 0.5)", fontSize: 13, marginBottom: 24, fontFamily: "'Quicksand', sans-serif" }, value: petName, onChange: (e) => setPetName(e.target.value), placeholder: "Es. Fuffi" }),
          React.createElement("button", { style: { background: "linear-gradient(135deg, #FFC53D, #FFD966)", color: "#4A3A6B", border: "none", borderRadius: 18, padding: "11px 28px", fontWeight: 700, fontSize: 14, cursor: "pointer", width: "100%", boxShadow: "0 8px 32px rgba(255, 197, 61, 0.3)", fontFamily: "'Quicksand', sans-serif" }, onClick: () => setStep(1), disabled: !petName || !myName }, "Avanti →")
        ) : React.createElement(React.Fragment, null,
          React.createElement("div", { style: { fontSize: 52, marginBottom: 12 } }, "🐱"),
          React.createElement("h1", { style: { fontSize: 28, marginBottom: 8, color: "#4A3A6B", fontWeight: 700, fontFamily: "'Fredoka', sans-serif" } }, "Ecco " + petName + "!"),
          React.createElement(RagdollCat, { stage: "cucciolo", size: 240 }),
          React.createElement("p", { style: { fontSize: 12, color: "#8F84B0", marginTop: 20, marginBottom: 24, lineHeight: 1.6 } }, "È appena nato e dipende da te. Ogni traguardo che raggiungi lo aiuta a crescere."),
          React.createElement("button", { style: { background: "linear-gradient(135deg, #FFC53D, #FFD966)", color: "#4A3A6B", border: "none", borderRadius: 18, padding: "11px 28px", fontWeight: 700, fontSize: 14, cursor: "pointer", width: "100%", boxShadow: "0 8px 32px rgba(255, 197, 61, 0.3)", fontFamily: "'Quicksand', sans-serif" }, onClick: () => onDone({ petName, myName, code: uid().toUpperCase().slice(0, 6) }) }, "Inizia l'avventura! 🚀")
        )
      );
    }

    // ===== HOME TAB =====
    function Home({ profile, stage }) {
      const vitaPercent = (profile.vitaDays / MAX_VITA_DAYS) * 100;
      const affection = getAffectionLevel(profile);
      const getLifeColor = () => vitaPercent > 70 ? "#45D6B5" : vitaPercent > 40 ? "#FFE070" : "#FF6FB0";

      return React.createElement("div", { style: { padding: "4px 4px 20px" } },
        React.createElement("div", { style: { textAlign: "center", marginBottom: 16 } },
          React.createElement(RagdollCat, { stage: stage.key, size: 280 }),
          React.createElement("div", { style: { marginTop: 12 } },
            React.createElement("div", { style: { fontWeight: 700, fontSize: 14, color: "#4A3A6B" } }, stage.label),
            React.createElement("div", { style: { fontSize: 11, color: "#8F84B0" } }, "⭐ " + profile.points + " pt"),
            React.createElement("div", { style: { fontSize: 28, marginTop: 4 } }, affection.emoji),
            React.createElement("div", { style: { fontSize: 10, color: affection.color, fontWeight: 700 } }, affection.text)
          )
        ),
        React.createElement("div", { style: { background: "rgba(255, 232, 240, 0.6)", backdropFilter: "blur(10px)", borderRadius: 14, padding: 14, marginBottom: 12, border: "1px solid rgba(255, 200, 220, 0.3)" } },
          React.createElement("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: 8 } },
            React.createElement("div", { style: { fontSize: 11, fontWeight: 700, color: "#4A3A6B" } }, "Vita"),
            React.createElement("div", { style: { fontSize: 13, fontWeight: 700, color: "#FF6FB0" } }, formatDays(profile.vitaDays))
